<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ site.description }}">
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ========== Reset & Base ========== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: 'DM Sans', 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    background-color: #0c0d12;
    color: #c8cad0;
    line-height: 1.8;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  ::selection {
    background: rgba(249, 115, 22, 0.35);
    color: #fff;
  }

  /* ========== Progress Bar ========== */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #f97316, #fb923c);
    width: 0%;
    z-index: 1000;
    transition: width 0.15s ease-out;
  }

  /* ========== Mini Header ========== */
  .mini-header {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 900;
    font-size: 0.8rem;
    font-weight: 500;
    color: #777b88;
    letter-spacing: 0.05em;
    background: rgba(18, 19, 26, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 4px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    user-select: none;
  }

  /* ========== Home Button ========== */
  .home-btn {
    position: fixed;
    top: 12px;
    left: 20px;
    z-index: 900;
    font-size: 0.78rem;
    font-weight: 500;
    color: #555a6a;
    background: rgba(18, 19, 26, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    text-decoration: none;
    transition: color 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .home-btn:hover {
    color: #f97316;
    border-color: rgba(249, 115, 22, 0.2);
  }

  /* ========== Scroll Container ========== */
  .carousel {
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    height: 100vh;
    width: 100vw;
    scrollbar-width: none;
  }

  .carousel::-webkit-scrollbar { display: none; }

  /* ========== Slide ========== */
  .slide {
    flex: 0 0 100vw;
    min-width: 100vw;
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 32px 100px;
    position: relative;
  }

  .slide--article { justify-content: center; }

  .slide-inner {
    max-width: 640px;
    width: 100%;
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.12) transparent;
  }

  .slide-inner::-webkit-scrollbar { width: 4px; }
  .slide-inner::-webkit-scrollbar-track { background: transparent; }
  .slide-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  /* ========== Article Layout: content + glossary sidebar ========== */
  .article-layout {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    max-width: 960px;
    width: 100%;
    max-height: calc(100vh - 160px);
  }

  .article-main {
    flex: 1;
    min-width: 0;
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.12) transparent;
    padding-right: 8px;
  }

  .article-main::-webkit-scrollbar { width: 4px; }
  .article-main::-webkit-scrollbar-track { background: transparent; }
  .article-main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  .article-sidebar {
    width: 240px;
    flex-shrink: 0;
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
  }

  .article-sidebar::-webkit-scrollbar { width: 3px; }
  .article-sidebar::-webkit-scrollbar-track { background: transparent; }
  .article-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .sidebar-label {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #555a6a;
    margin-bottom: 12px;
  }

  .sidebar-term {
    margin-bottom: 10px;
    padding: 10px 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    transition: border-color 0.2s;
  }

  .sidebar-term:hover {
    border-color: rgba(249, 115, 22, 0.2);
  }

  .sidebar-term .term-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: #fb923c;
    margin-bottom: 4px;
  }

  .sidebar-term .term-desc {
    font-size: 0.78rem;
    color: #777b88;
    line-height: 1.6;
  }

  /* ========== Title Slide ========== */
  .slide--title { text-align: center; }

  .slide--title h1 {
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    color: #ecedf2;
  }

  .slide--title h1 span { color: #f97316; }

  .slide--title p {
    font-size: 1.1rem;
    color: #777b88;
    line-height: 1.9;
  }

  .slide--title .date-badge {
    display: inline-block;
    font-size: 0.85rem;
    font-weight: 500;
    color: #fb923c;
    background: rgba(251, 146, 60, 0.1);
    padding: 6px 18px;
    border-radius: 24px;
    margin-bottom: 24px;
    letter-spacing: 0.04em;
    border: 1px solid rgba(251, 146, 60, 0.15);
  }

  .slide--title .article-count {
    margin-top: 16px;
    font-size: 0.85rem;
    color: #555a6a;
    letter-spacing: 0.05em;
  }

  .slide--title .arrow-hint {
    margin-top: 48px;
    font-size: 0.85rem;
    color: #555a6a;
    animation: pulse-hint 2s ease-in-out infinite;
  }

  @keyframes pulse-hint {
    0%, 100% { opacity: 0.5; transform: translateX(0); }
    50% { opacity: 1; transform: translateX(6px); }
  }

  /* ========== Article Slide ========== */
  .slide--article .article-number {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #fb923c;
    background: rgba(251, 146, 60, 0.1);
    padding: 4px 12px;
    border-radius: 16px;
    margin-bottom: 16px;
    letter-spacing: 0.06em;
    border: 1px solid rgba(251, 146, 60, 0.12);
  }

  .slide--article h2 {
    font-size: 1.55rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 20px;
    color: #ecedf2;
    letter-spacing: -0.01em;
  }

  .slide--article .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    margin-bottom: 20px;
    font-size: 0.82rem;
    color: #555a6a;
  }

  .slide--article .meta-row a {
    color: #f97316;
    text-decoration: none;
    transition: color 0.15s;
  }

  .slide--article .meta-row a:hover {
    color: #fb923c;
    text-decoration: underline;
  }

  .slide--article .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    font-size: 0.85rem;
    flex-wrap: wrap;
  }

  .slide--article .stats .stat {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    padding: 6px 14px;
    border-radius: 8px;
    color: #888d9e;
    font-weight: 500;
  }

  .slide--article .stats .stat strong {
    color: #f97316;
    font-weight: 700;
  }

  .slide--article .section-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #f97316;
    margin-bottom: 6px;
    margin-top: 20px;
  }

  .slide--article p {
    font-size: 0.95rem;
    color: #a0a4b2;
    margin-bottom: 12px;
    line-height: 1.9;
  }

  /* ========== Comments (open by default) ========== */
  .slide--article details {
    margin-top: 16px;
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 10px;
    overflow: hidden;
  }

  .slide--article details + details { margin-top: 8px; }

  .slide--article summary {
    padding: 10px 16px;
    font-size: 0.88rem;
    font-weight: 600;
    color: #c8cad0;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.03);
    transition: background 0.15s;
    list-style: none;
  }

  .slide--article summary::-webkit-details-marker { display: none; }

  .slide--article summary::before {
    content: '− ';
    font-weight: 700;
    color: #f97316;
    margin-right: 4px;
  }

  .slide--article details:not([open]) summary::before { content: '+ '; }

  .slide--article summary:hover {
    background: rgba(249, 115, 22, 0.06);
  }

  .slide--article details ul {
    list-style: none;
    padding: 12px 16px;
  }

  .slide--article details li {
    font-size: 0.88rem;
    color: #888d9e;
    line-height: 1.8;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  .slide--article details li:last-child { border-bottom: none; }

  /* Details with plain paragraph (no list) */
  .slide--article details > p {
    padding: 12px 16px;
    font-size: 0.88rem;
    color: #888d9e;
    line-height: 1.8;
  }

  /* ========== Navigation Arrows ========== */
  .nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 800;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    color: #888d9e;
    transition: all 0.2s ease;
    user-select: none;
  }

  .nav-arrow:hover {
    background: rgba(249, 115, 22, 0.15);
    color: #fb923c;
    border-color: rgba(249, 115, 22, 0.3);
    box-shadow: 0 4px 20px rgba(249, 115, 22, 0.15);
  }

  .nav-arrow:active { transform: translateY(-50%) scale(0.92); }

  .nav-arrow--left { left: 20px; }
  .nav-arrow--right { right: 20px; }

  .nav-arrow.hidden { opacity: 0; pointer-events: none; }

  /* ========== Navigation Dots ========== */
  .nav-dots {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 800;
    display: flex;
    gap: 10px;
    background: rgba(18, 19, 26, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 10px 18px;
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  .nav-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    cursor: pointer;
    transition: all 0.25s ease;
    border: none;
    padding: 0;
  }

  .nav-dot:hover { background: rgba(255, 255, 255, 0.3); }

  .nav-dot.active {
    background: #f97316;
    width: 28px;
    border-radius: 5px;
    box-shadow: 0 0 12px rgba(249, 115, 22, 0.3);
  }

  /* ========== Inline Glossary (mobile) ========== */
  .inline-glossary .sidebar-label {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #555a6a;
    margin-bottom: 10px;
  }

  .inline-glossary .inline-terms {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .inline-glossary .inline-term {
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    font-size: 0.8rem;
  }

  .inline-glossary .inline-term .term-name {
    font-weight: 600;
    color: #fb923c;
  }

  .inline-glossary .inline-term .term-desc {
    color: #777b88;
    margin-top: 2px;
  }

  /* ========== Responsive ========== */
  @media (max-width: 960px) {
    .article-sidebar { display: none; }
    .inline-glossary {
      display: block !important;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
  }

  @media (min-width: 961px) {
    .inline-glossary { display: none !important; }
  }

  @media (max-width: 700px) {
    .slide { padding: 50px 20px 90px; }
    .slide--title h1 { font-size: 2rem; }
    .slide--article h2 { font-size: 1.25rem; }
    .nav-arrow { width: 40px; height: 40px; font-size: 1rem; }
    .nav-arrow--left { left: 10px; }
    .nav-arrow--right { right: 10px; }
    .home-btn .home-btn-text { display: none; }
    .nav-dots { gap: 6px; padding: 8px 12px; }
    .nav-dot { width: 8px; height: 8px; }
    .nav-dot.active { width: 20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Mini Header -->
<div class="mini-header" id="miniHeader"></div>

<!-- Home Button -->
<a href="{{ '/' | relative_url }}" class="home-btn" aria-label="ホームに戻る">
  <span>&#8592;</span>
  <span class="home-btn-text">HN Digest</span>
</a>

<!-- Navigation Arrows -->
<button class="nav-arrow nav-arrow--left hidden" id="arrowLeft" aria-label="前のスライド">&#8592;</button>
<button class="nav-arrow nav-arrow--right" id="arrowRight" aria-label="次のスライド">&#8594;</button>

<!-- Carousel Container -->
<div class="carousel" id="carousel"></div>

<!-- Navigation Dots -->
<div class="nav-dots" id="navDots"></div>

<!-- Hidden source content rendered by Jekyll/kramdown -->
<div id="source" data-title="{{ page.title | escape }}" style="display:none">
{{ content }}
</div>

<script>
(function() {
  const source = document.getElementById('source');
  if (!source) return;

  // ========== Date extraction from page title ==========
  const pageTitle = source.getAttribute('data-title') || '';
  const dateMatch = pageTitle.match(/(\d{4})-(\d{2})-(\d{2})/);
  const dateStr = dateMatch
    ? dateMatch[1] + '.' + dateMatch[2] + '.' + dateMatch[3]
    : '';
  const shortDate = dateMatch
    ? parseInt(dateMatch[2]) + '/' + parseInt(dateMatch[3])
    : '';

  // ========== Parse source content ==========
  const h1 = source.querySelector('h1');
  const allH2s = Array.from(source.querySelectorAll('h2'));

  // Intro paragraph (first <p> after h1)
  let introText = '';
  if (h1) {
    let next = h1.nextElementSibling;
    while (next && (next.tagName === 'HR' || next.tagName === 'BR')) {
      next = next.nextElementSibling;
    }
    if (next && next.tagName === 'P') {
      introText = next.textContent.trim();
    }
  }

  // Collect sections: each h2 + all siblings until next h2
  const sections = allH2s.map(h2 => {
    const content = [];
    let sib = h2.nextElementSibling;
    while (sib && sib.tagName !== 'H2') {
      if (sib.tagName !== 'HR') content.push(sib);
      sib = sib.nextElementSibling;
    }
    return { heading: h2, content };
  });

  // Separate articles (h2 starts with digit) from glossary
  const articles = sections.filter(s => /^\d/.test(s.heading.textContent.trim()));
  const glossarySec = sections.find(s => s.heading.textContent.includes('用語集'));

  // ========== Parse glossary terms ==========
  const glossaryTerms = [];
  if (glossarySec) {
    const table = glossarySec.content.find(el => el.tagName === 'TABLE');
    if (table) {
      table.querySelectorAll('tbody tr').forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length >= 2) {
          glossaryTerms.push({
            name: cells[0].textContent.trim(),
            desc: cells[1].textContent.trim()
          });
        }
      });
    }
  }

  // ========== Match glossary terms to articles ==========
  function findRelevantTerms(contentElements) {
    const text = contentElements.map(el => el.textContent).join(' ');
    return glossaryTerms.filter(term => {
      const baseName = term.name.replace(/（.*/, '').replace(/\(.*/, '').trim();
      return text.includes(baseName);
    });
  }

  // ========== Parse a single article ==========
  function parseArticle(heading, contentElements) {
    const fullText = contentElements.map(el => el.textContent).join('\n');
    const headingText = heading.textContent.replace(/^\d+\.\s*/, '').trim();

    // Metadata — extract via regex from full text (handles single-paragraph metadata)
    let origTitle = '';
    let m = fullText.match(/原題[:：]\s*(.+?)(?=\s*URL[:：]|\n|$)/);
    if (m) origTitle = m[1].trim();

    let url = '';
    m = fullText.match(/URL[:：]\s*(https?:\/\/\S+)/);
    if (m) url = m[1].trim();

    let hnUrl = '';
    m = fullText.match(/HN[:：]\s*(https?:\/\/\S+)/);
    if (m) hnUrl = m[1].trim();

    let score = '', comments = '', total = '';
    m = fullText.match(/スコア[:：]\s*([\d,]+)/);
    if (m) score = m[1].replace(/,/g, '');
    m = fullText.match(/コメント[:：]\s*([\d,]+)件?/);
    if (m) comments = m[1].replace(/,/g, '');
    m = fullText.match(/合計[:：]\s*([\d,]+)/);
    if (m) total = m[1].replace(/,/g, '');

    // Section content — from paragraphs with known labels
    let summary = '', detail = '', whyNotable = '';
    contentElements.forEach(el => {
      if (el.tagName !== 'P') return;
      const strong = el.querySelector('strong');
      if (!strong) return;
      const label = strong.textContent.trim();
      const afterLabel = el.textContent.replace(label, '').trim();
      if (/^ざっくり/.test(label)) summary = afterLabel;
      else if (/^もう少し/.test(label)) detail = afterLabel;
      else if (/^なぜ注目/.test(label)) whyNotable = afterLabel;
    });

    // Details blocks (comment sections)
    const detailsBlocks = contentElements.filter(el => el.tagName === 'DETAILS');

    return { headingText, origTitle, url, hnUrl, score, comments, total,
             summary, detail, whyNotable, detailsBlocks };
  }

  // ========== Escape HTML for safe insertion ==========
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ========== Build Carousel ==========
  const carousel = document.getElementById('carousel');
  const totalSlides = 1 + articles.length;

  // --- Slide 0: Title ---
  const titleSlide = document.createElement('div');
  titleSlide.className = 'slide slide--title';
  titleSlide.innerHTML =
    '<div class="slide-inner">' +
      (dateStr ? '<div class="date-badge">' + esc(dateStr) + '</div>' : '') +
      '<h1>HN Digest<span> — ' + esc(shortDate) + '</span></h1>' +
      '<p>' + esc(introText) + '</p>' +
      '<div class="article-count">' + articles.length + ' articles</div>' +
      '<div class="arrow-hint">&#8594; スワイプまたは矢印キーで次へ</div>' +
    '</div>';
  carousel.appendChild(titleSlide);

  // --- Article Slides ---
  articles.forEach((section, idx) => {
    const art = parseArticle(section.heading, section.content);
    const relevantTerms = findRelevantTerms(section.content);

    const slide = document.createElement('div');
    slide.className = 'slide slide--article';

    // Details HTML (with open attribute + fix raw markdown lists)
    const detailsHTML = art.detailsBlocks.map(el => {
      const clone = el.cloneNode(true);
      clone.setAttribute('open', '');
      // If kramdown didn't convert markdown lists inside <details>,
      // the content will be raw text with "- " prefixes. Fix it.
      if (!clone.querySelector('ul') && !clone.querySelector('ol')) {
        const summary = clone.querySelector('summary');
        const summaryText = summary ? summary.textContent.trim() : '';
        const rawText = clone.textContent.replace(summaryText, '').trim();
        if (rawText.includes('- ') || rawText.includes('「')) {
          const lines = rawText.split('\n')
            .map(l => l.trim())
            .filter(l => l.length > 0);
          const items = lines.map(l => l.replace(/^[-–—]\s*/, ''));
          const ul = document.createElement('ul');
          items.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item;
            ul.appendChild(li);
          });
          // Remove all content except summary, then append the list
          while (clone.lastChild && clone.lastChild !== summary) {
            clone.removeChild(clone.lastChild);
          }
          clone.appendChild(ul);
        }
      }
      return clone.outerHTML;
    }).join('\n');

    // Sidebar glossary (desktop)
    let sidebarHTML = '';
    if (relevantTerms.length > 0) {
      sidebarHTML =
        '<aside class="article-sidebar">' +
          '<div class="sidebar-label">用語</div>' +
          relevantTerms.map(t =>
            '<div class="sidebar-term">' +
              '<div class="term-name">' + esc(t.name) + '</div>' +
              '<div class="term-desc">' + esc(t.desc) + '</div>' +
            '</div>'
          ).join('') +
        '</aside>';
    }

    // Inline glossary (mobile)
    let inlineGlossaryHTML = '';
    if (relevantTerms.length > 0) {
      inlineGlossaryHTML =
        '<div class="inline-glossary">' +
          '<div class="sidebar-label">関連用語</div>' +
          '<div class="inline-terms">' +
          relevantTerms.map(t =>
            '<div class="inline-term">' +
              '<div class="term-name">' + esc(t.name) + '</div>' +
              '<div class="term-desc">' + esc(t.desc) + '</div>' +
            '</div>'
          ).join('') +
          '</div>' +
        '</div>';
    }

    // Links
    const urlLink = art.url
      ? '<a href="' + esc(art.url) + '" target="_blank" rel="noopener">元記事 &#8599;</a>'
      : '';
    const hnLink = art.hnUrl
      ? '<a href="' + esc(art.hnUrl) + '" target="_blank" rel="noopener">HN &#8599;</a>'
      : '';

    // Build sections conditionally
    let sectionsHTML = '';
    if (art.summary) {
      sectionsHTML +=
        '<div class="section-label">ざっくり言うと</div>' +
        '<p>' + esc(art.summary) + '</p>';
    }
    if (art.detail) {
      sectionsHTML +=
        '<div class="section-label">もう少し詳しく</div>' +
        '<p>' + esc(art.detail) + '</p>';
    }
    if (art.whyNotable) {
      sectionsHTML +=
        '<div class="section-label">なぜ注目？</div>' +
        '<p>' + esc(art.whyNotable) + '</p>';
    }

    const mainContent =
      '<div class="article-main">' +
        '<div class="article-number">ARTICLE ' + (idx + 1) + '</div>' +
        '<h2>' + esc(art.headingText) + '</h2>' +
        (art.origTitle ? '<div class="meta-row"><span>' + esc(art.origTitle) + '</span></div>' : '') +
        '<div class="meta-row">' + urlLink + hnLink + '</div>' +
        '<div class="stats">' +
          (art.score ? '<div class="stat"><strong>' + esc(art.score) + '</strong> pts</div>' : '') +
          (art.comments ? '<div class="stat"><strong>' + esc(art.comments) + '</strong> comments</div>' : '') +
          (art.total ? '<div class="stat">Total <strong>' + esc(art.total) + '</strong></div>' : '') +
        '</div>' +
        sectionsHTML +
        detailsHTML +
        inlineGlossaryHTML +
      '</div>';

    slide.innerHTML =
      '<div class="article-layout">' +
        mainContent +
        sidebarHTML +
      '</div>';

    carousel.appendChild(slide);
  });

  // ========== Navigation Dots ==========
  const navDots = document.getElementById('navDots');
  for (let i = 0; i < totalSlides; i++) {
    const dot = document.createElement('button');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'スライド ' + (i + 1) + ' へ');
    dot.addEventListener('click', () => goToSlide(i));
    navDots.appendChild(dot);
  }

  // ========== State & Navigation ==========
  let currentSlide = 0;
  const progressBar = document.getElementById('progressBar');
  const miniHeader = document.getElementById('miniHeader');
  const arrowLeft = document.getElementById('arrowLeft');
  const arrowRight = document.getElementById('arrowRight');

  function updateUI(index) {
    currentSlide = index;
    const progress = totalSlides > 1 ? (index / (totalSlides - 1)) * 100 : 100;
    progressBar.style.width = progress + '%';
    miniHeader.textContent = (index + 1) + ' / ' + totalSlides;

    navDots.querySelectorAll('.nav-dot').forEach((d, i) => {
      d.classList.toggle('active', i === index);
    });

    arrowLeft.classList.toggle('hidden', index === 0);
    arrowRight.classList.toggle('hidden', index === totalSlides - 1);
  }

  function goToSlide(index) {
    if (index < 0 || index >= totalSlides) return;
    carousel.children[index].scrollIntoView({
      behavior: 'smooth', block: 'nearest', inline: 'start'
    });
  }

  // ========== Scroll Detection ==========
  let scrollTimeout;
  carousel.addEventListener('scroll', () => {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      const index = Math.round(carousel.scrollLeft / carousel.offsetWidth);
      updateUI(index);
    }, 50);
  }, { passive: true });

  // ========== Arrow Buttons ==========
  arrowLeft.addEventListener('click', () => goToSlide(currentSlide - 1));
  arrowRight.addEventListener('click', () => goToSlide(currentSlide + 1));

  // ========== Keyboard Navigation ==========
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') { e.preventDefault(); goToSlide(currentSlide - 1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); goToSlide(currentSlide + 1); }
  });

  // ========== Initial State ==========
  updateUI(0);
})();
</script>

</body>
</html>
